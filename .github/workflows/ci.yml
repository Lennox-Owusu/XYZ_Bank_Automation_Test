name: Test Automation CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: maven
    
    - name: Install Chrome
      uses: browser-actions/setup-chrome@latest
      with:
        chrome-version: stable
    
    - name: Display Chrome version
      run: google-chrome --version
    
    - name: Run tests
      id: tests
      run: mvn clean test
      continue-on-error: true
    
    - name: Generate Allure Report
      if: always()
      run: mvn allure:report
      continue-on-error: true
    
    - name: Debug - List test results
      if: always()
      run: |
        echo "=== Surefire Reports Directory ==="
        ls -la target/surefire-reports/ 2>/dev/null || echo "Directory not found"
        echo ""
        echo "=== Looking for TestNG results ==="
        find target/surefire-reports -name "*.xml" 2>/dev/null || echo "No XML files found"
        echo ""
        if [ -f target/surefire-reports/testng-results.xml ]; then
          echo "=== TestNG Results Content ==="
          head -20 target/surefire-reports/testng-results.xml
        else
          echo "testng-results.xml not found"
        fi
        if [ -f target/surefire-reports/TEST-TestSuite.xml ]; then
          echo "=== TEST-TestSuite.xml Content (first 30 lines) ==="
          head -30 target/surefire-reports/TEST-TestSuite.xml
        fi
    
    - name: Get test results summary
      if: always()
      id: test_summary
      run: |
        # Initialize variables
        TOTAL=0
        PASSED=0
        FAILED=0
        SKIPPED=0
        
        # Look for TEST-TestSuite.xml (JUnit/Surefire format)
        if [ -f target/surefire-reports/TEST-TestSuite.xml ]; then
          echo "Found TEST-TestSuite.xml, parsing..."
          
          # Parse JUnit XML format
          TOTAL=$(grep -oP 'tests="\K[0-9]+' target/surefire-reports/TEST-TestSuite.xml | head -1)
          FAILURES=$(grep -oP 'failures="\K[0-9]+' target/surefire-reports/TEST-TestSuite.xml | head -1)
          ERRORS=$(grep -oP 'errors="\K[0-9]+' target/surefire-reports/TEST-TestSuite.xml | head -1)
          SKIPPED=$(grep -oP 'skipped="\K[0-9]+' target/surefire-reports/TEST-TestSuite.xml | head -1)
          
          # Calculate passed (total - failures - errors)
          TOTAL=${TOTAL:-0}
          FAILURES=${FAILURES:-0}
          ERRORS=${ERRORS:-0}
          SKIPPED=${SKIPPED:-0}
          
          FAILED=$((FAILURES + ERRORS))
          PASSED=$((TOTAL - FAILED - SKIPPED))
          
          echo "Parsed from TEST-TestSuite.xml:"
          echo "  Total: $TOTAL"
          echo "  Failures: $FAILURES"
          echo "  Errors: $ERRORS"
          echo "  Skipped: $SKIPPED"
          echo "  Calculated Passed: $PASSED"
          echo "  Calculated Failed: $FAILED"
          
        elif [ -f target/surefire-reports/testng-results.xml ]; then
          echo "Found testng-results.xml, parsing..."
          
          # Parse TestNG format
          TOTAL=$(grep -oP 'total="\K[0-9]+' target/surefire-reports/testng-results.xml | head -1)
          PASSED=$(grep -oP 'passed="\K[0-9]+' target/surefire-reports/testng-results.xml | head -1)
          FAILED=$(grep -oP 'failed="\K[0-9]+' target/surefire-reports/testng-results.xml | head -1)
          SKIPPED=$(grep -oP 'skipped="\K[0-9]+' target/surefire-reports/testng-results.xml | head -1)
          
          TOTAL=${TOTAL:-0}
          PASSED=${PASSED:-0}
          FAILED=${FAILED:-0}
          SKIPPED=${SKIPPED:-0}
          
        else
          echo "No test results XML found"
        fi
        
        echo ""
        echo "Final values: Total=$TOTAL, Passed=$PASSED, Failed=$FAILED, Skipped=$SKIPPED"
        
        # Write to GitHub output
        echo "total=$TOTAL" >> $GITHUB_OUTPUT
        echo "passed=$PASSED" >> $GITHUB_OUTPUT
        echo "failed=$FAILED" >> $GITHUB_OUTPUT
        echo "skipped=$SKIPPED" >> $GITHUB_OUTPUT
        
        # Determine status
        if [ "$FAILED" -gt 0 ]; then
          echo "status=FAILED" >> $GITHUB_OUTPUT
          echo "status_emoji=🔴" >> $GITHUB_OUTPUT
          echo "Status: FAILED (has failures)"
        elif [ "$TOTAL" -eq 0 ]; then
          echo "status=NO TESTS" >> $GITHUB_OUTPUT
          echo "status_emoji=⚠️" >> $GITHUB_OUTPUT
          echo "Status: NO TESTS (no tests found)"
        else
          echo "status=PASSED" >> $GITHUB_OUTPUT
          echo "status_emoji=✅" >> $GITHUB_OUTPUT
          echo "Status: PASSED"
        fi
    
    - name: Extract failed test details
      if: always()
      id: failed_tests
      run: |
        FAILED_DETAILS=""
        
        if [ -d target/surefire-reports ]; then
          if ls target/surefire-reports/*.txt 1> /dev/null 2>&1; then
            FAILED_DETAILS=$(grep -A 5 "FAILED" target/surefire-reports/*.txt 2>/dev/null | head -20 || echo "No failure details found")
          fi
          
          echo "$FAILED_DETAILS" > failed_tests.txt
          
          FAILED_TESTS_SLACK=$(echo "$FAILED_DETAILS" | head -c 1500)
          FAILED_TESTS_SLACK=$(echo "$FAILED_TESTS_SLACK" | sed 's/"/\\"/g' | sed ':a;N;$!ba;s/\n/\\n/g')
          
          echo "failed_details<<EOF" >> $GITHUB_OUTPUT
          echo "$FAILED_TESTS_SLACK" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        fi
    
    - name: Send Slack notification
      if: always()
      uses: slackapi/slack-github-action@v1.25.0
      with:
        payload: |
          {
            "blocks": [
              {
                "type": "header",
                "text": {
                  "type": "plain_text",
                  "text": "${{ steps.test_summary.outputs.status_emoji }} XYZ Bank Test Automation Report",
                  "emoji": true
                }
              },
              {
                "type": "section",
                "fields": [
                  {
                    "type": "mrkdwn",
                    "text": "*Status:*\n${{ steps.test_summary.outputs.status }}"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Branch:*\n`${{ github.ref_name }}`"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Triggered by:*\n${{ github.actor }}"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Event:*\n${{ github.event_name }}"
                  }
                ]
              },
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*📊 Test Results Summary*"
                }
              },
              {
                "type": "section",
                "fields": [
                  {
                    "type": "mrkdwn",
                    "text": "*Total Tests:*\n${{ steps.test_summary.outputs.total }}"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Passed:*\n✅ ${{ steps.test_summary.outputs.passed }}"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Failed:*\n❌ ${{ steps.test_summary.outputs.failed }}"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Skipped:*\n⏭️ ${{ steps.test_summary.outputs.skipped }}"
                  }
                ]
              },
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*🔗 Links*\n• <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Workflow Run>\n• <${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|View Commit>"
                }
              },
              {
                "type": "divider"
              },
              {
                "type": "context",
                "elements": [
                  {
                    "type": "mrkdwn",
                    "text": "Repository: *${{ github.repository }}* | Run #${{ github.run_number }} | ${{ github.event.head_commit.message }}"
                  }
                ]
              }
            ]
          }
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
    
    - name: Send Gmail notification
      if: always()
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com
        server_port: 587
        username: ${{ secrets.GMAIL_USERNAME }}
        password: ${{ secrets.GMAIL_APP_PASSWORD }}
        subject: "${{ steps.test_summary.outputs.status_emoji }} XYZ Bank Test Report - ${{ steps.test_summary.outputs.status }}"
        to: ${{ secrets.GMAIL_RECIPIENT }}
        from: ${{ secrets.GMAIL_USERNAME }}
        html_body: |
          <!DOCTYPE html>
          <html>
          <head>
            <style>
              body { 
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
                line-height: 1.6; 
                color: #333;
                margin: 0;
                padding: 0;
                background-color: #f5f5f5;
              }
              .container { 
                max-width: 600px; 
                margin: 20px auto; 
                background: white;
                border-radius: 12px;
                overflow: hidden;
                box-shadow: 0 4px 6px rgba(0,0,0,0.1);
              }
              .header { 
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
                color: white; 
                padding: 40px 30px; 
                text-align: center;
              }
              .header h1 {
                margin: 0;
                font-size: 28px;
                font-weight: 600;
              }
              .status-badge { 
                display: inline-block; 
                padding: 12px 24px; 
                border-radius: 25px; 
                font-weight: bold; 
                margin: 15px 0;
                font-size: 16px;
                letter-spacing: 0.5px;
              }
              .status-passed { background-color: #10b981; color: white; }
              .status-failed { background-color: #ef4444; color: white; }
              .status-error { background-color: #f59e0b; color: white; }
              .content { 
                padding: 30px;
              }
              .section-title {
                font-size: 20px;
                font-weight: 600;
                color: #1f2937;
                margin: 25px 0 15px 0;
                padding-bottom: 10px;
                border-bottom: 2px solid #e5e7eb;
              }
              .metrics { 
                display: grid; 
                grid-template-columns: repeat(2, 1fr); 
                gap: 15px; 
                margin: 20px 0;
              }
              .metric-card { 
                background: #f9fafb;
                padding: 20px; 
                border-radius: 10px;
                border: 1px solid #e5e7eb;
                text-align: center;
              }
              .metric-value { 
                font-size: 36px; 
                font-weight: bold; 
                color: #667eea;
                margin-bottom: 5px;
              }
              .metric-label { 
                color: #6b7280; 
                font-size: 13px;
                text-transform: uppercase;
                letter-spacing: 0.5px;
              }
              .details { 
                background: #f9fafb;
                padding: 20px; 
                border-radius: 10px;
                margin-top: 20px;
                border: 1px solid #e5e7eb;
              }
              .info-row { 
                display: flex; 
                justify-content: space-between; 
                padding: 12px 0; 
                border-bottom: 1px solid #e5e7eb;
              }
              .info-row:last-child {
                border-bottom: none;
              }
              .info-label { 
                font-weight: 600; 
                color: #6b7280;
                font-size: 14px;
              }
              .info-value { 
                color: #111827;
                font-family: 'Courier New', monospace;
                font-size: 14px;
              }
              .button { 
                display: inline-block; 
                background: #667eea; 
                color: white; 
                padding: 14px 32px; 
                text-decoration: none; 
                border-radius: 8px; 
                margin-top: 25px;
                font-weight: 600;
                transition: background 0.3s;
              }
              .button:hover {
                background: #5568d3;
              }
              .footer { 
                text-align: center; 
                margin-top: 30px; 
                padding-top: 20px;
                border-top: 1px solid #e5e7eb;
                color: #6b7280; 
                font-size: 12px;
              }
              .emoji {
                font-size: 24px;
                margin-right: 8px;
              }
            </style>
          </head>
          <body>
            <div class="container">
              <div class="header">
                <h1><span class="emoji">🏦</span>XYZ Bank Test Automation</h1>
                <div class="status-badge status-${{ steps.test_summary.outputs.status == 'PASSED' && 'passed' || steps.test_summary.outputs.status == 'FAILED' && 'failed' || 'error' }}">
                  ${{ steps.test_summary.outputs.status }}
                </div>
              </div>
              
              <div class="content">
                <div class="section-title">📊 Test Execution Summary</div>
                
                <div class="metrics">
                  <div class="metric-card">
                    <div class="metric-value">${{ steps.test_summary.outputs.total }}</div>
                    <div class="metric-label">Total Tests</div>
                  </div>
                  <div class="metric-card">
                    <div class="metric-value" style="color: #10b981;">${{ steps.test_summary.outputs.passed }}</div>
                    <div class="metric-label">✅ Passed</div>
                  </div>
                  <div class="metric-card">
                    <div class="metric-value" style="color: #ef4444;">${{ steps.test_summary.outputs.failed }}</div>
                    <div class="metric-label">❌ Failed</div>
                  </div>
                  <div class="metric-card">
                    <div class="metric-value" style="color: #f59e0b;">${{ steps.test_summary.outputs.skipped }}</div>
                    <div class="metric-label">⏭️ Skipped</div>
                  </div>
                </div>
                
                <div class="section-title">📋 Execution Details</div>
                <div class="details">
                  <div class="info-row">
                    <span class="info-label">Repository</span>
                    <span class="info-value">${{ github.repository }}</span>
                  </div>
                  <div class="info-row">
                    <span class="info-label">Branch</span>
                    <span class="info-value">${{ github.ref_name }}</span>
                  </div>
                  <div class="info-row">
                    <span class="info-label">Commit</span>
                    <span class="info-value">${{ github.sha }}</span>
                  </div>
                  <div class="info-row">
                    <span class="info-label">Triggered by</span>
                    <span class="info-value">${{ github.actor }}</span>
                  </div>
                  <div class="info-row">
                    <span class="info-label">Event Type</span>
                    <span class="info-value">${{ github.event_name }}</span>
                  </div>
                  <div class="info-row">
                    <span class="info-label">Workflow Run</span>
                    <span class="info-value">#${{ github.run_number }}</span>
                  </div>
                  <div class="info-row">
                    <span class="info-label">Commit Message</span>
                    <span class="info-value">${{ github.event.head_commit.message }}</span>
                  </div>
                </div>
                
                <div style="text-align: center;">
                  <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" class="button">
                    📊 View Full Report on GitHub
                  </a>
                </div>
                
                <div class="footer">
                  <p><strong>XYZ Bank Test Automation CI/CD Pipeline</strong></p>
                  <p>Automated test execution powered by GitHub Actions</p>
                  <p style="margin-top: 10px; color: #9ca3af;">
                    This is an automated notification. Please do not reply to this email.
                  </p>
                </div>
              </div>
            </div>
          </body>
          </html>
    
    - name: Upload Allure Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-results
        path: target/allure-results
        retention-days: 30
        if-no-files-found: warn
    
    - name: Upload Allure Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-report
        path: target/site/allure-maven-plugin
        retention-days: 30
        if-no-files-found: warn
    
    - name: Upload Test Logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-logs
        path: logs/
        retention-days: 7
        if-no-files-found: ignore
    
    - name: Upload Surefire Reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: surefire-reports
        path: target/surefire-reports
        retention-days: 7
        if-no-files-found: warn
