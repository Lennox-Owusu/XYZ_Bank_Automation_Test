name: Test Automation CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ------------------------------------------------------------
      # (Optional) Build Docker image for running tests in container
      # Enable these if you want to run inside Docker later.
      # ------------------------------------------------------------
      # - name: Build Docker image
      #   run: docker build -t api-tests:latest .

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Record start time
        id: start_time
        shell: bash
        run: echo "start_time=$(date +%s)" >> $GITHUB_OUTPUT

      # ------------------------------------------------------------
      # Run tests on the host (simple & fast for API testing)
      # If you prefer Docker runtime, comment this and enable the
      # docker run block below.
      # ------------------------------------------------------------
      - name: Run tests
        id: tests
        run: mvn -B clean test
        continue-on-error: true

      # ------------------------------------------------------------
      # (Optional) Run tests INSIDE the Docker image (enable if needed)
      # ------------------------------------------------------------
      # - name: Run tests inside Docker
      #   id: tests
      #   run: docker run --rm -v $PWD:/work -w /work api-tests:latest mvn -B clean test
      #   continue-on-error: true

      - name: Calculate execution time
        if: always()
        id: execution_time
        shell: bash
        run: |
          END_TIME=$(date +%s)
          START_TIME=${{ steps.start_time.outputs.start_time }}
          DURATION=$((END_TIME - START_TIME))
          MINUTES=$((DURATION / 60))
          SECONDS=$((DURATION % 60))
          echo "duration_seconds=$DURATION" >> $GITHUB_OUTPUT
          echo "duration_formatted=${MINUTES}m ${SECONDS}s" >> $GITHUB_OUTPUT
          echo "Execution time: ${MINUTES}m ${SECONDS}s"

      - name: Generate Allure Report
        if: always()
        run: mvn -B allure:report
        continue-on-error: true

      - name: Upload Allure HTML report (static site)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: target/site/allure-maven-plugin

      - name: Upload Allure raw results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: target/allure-results

      # Publish test results summary (aggregates all surefire XMLs)
      - name: Publish unit test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: |
            target/surefire-reports/*.xml

      # Aggregate totals and status from all surefire XMLs
      - name: Compute test summary
        if: always()
        id: test_summary
        shell: bash
        run: |
          shopt -s nullglob
          files=(target/surefire-reports/TEST-*.xml target/surefire-reports/*.xml)
          TOTAL=0; FAIL=0; ERR=0; SKIP=0

          for f in "${files[@]}"; do
            line=$(grep -m1 "<testsuite " "$f" || true)
            if [ -n "$line" ]; then
              t=$(echo "$line" | sed -n 's/.*tests="\([0-9]*\)".*/\1/p')
              f1=$(echo "$line" | sed -n 's/.*failures="\([0-9]*\)".*/\1/p')
              e1=$(echo "$line" | sed -n 's/.*errors="\([0-9]*\)".*/\1/p')
              s1=$(echo "$line" | sed -n 's/.*skipped="\([0-9]*\)".*/\1/p')
              TOTAL=$((TOTAL + ${t:-0}))
              FAIL=$((FAIL + ${f1:-0}))
              ERR=$((ERR + ${e1:-0}))
              SKIP=$((SKIP + ${s1:-0}))
            fi
          done

          PASS=$((TOTAL - FAIL - ERR - SKIP))
          if [ "$TOTAL" -gt 0 ]; then
            PASS_RATE=$(( 100 * PASS / TOTAL ))
          else
            PASS_RATE=0
          fi

          if [ $((FAIL + ERR)) -gt 0 ]; then
            STATUS="FAILED"
          else
            STATUS="PASSED"
          fi

          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "passed=$PASS" >> $GITHUB_OUTPUT
          echo "failed=$FAIL" >> $GITHUB_OUTPUT
          echo "errors=$ERR" >> $GITHUB_OUTPUT
          echo "skipped=$SKIP" >> $GITHUB_OUTPUT
          echo "pass_rate=$PASS_RATE" >> $GITHUB_OUTPUT
          echo "status=$STATUS" >> $GITHUB_OUTPUT

      # Build a concise failed tests list
      - name: Collect failed tests list
        if: always()
        id: failed_tests
        shell: bash
        run: |
          shopt -s nullglob
          files=(target/surefire-reports/TEST-*.xml target/surefire-reports/*.xml)
          OUT=""
          for f in "${files[@]}"; do
            # naive parse: list testcases that contain failure or error tags on same line block
            # for more robust parsing, use xmlstarlet or a junit parser action
            while IFS= read -r tc; do
              CLASS=$(echo "$tc" | sed -n 's/.*classname="\([^"]*\)".*/\1/p')
              NAME=$(echo "$tc"  | sed -n 's/.*name="\([^"]*\)".*/\1/p')
              if echo "$tc" | grep -qE "(<failure|<error)"; then
                OUT+="$CLASS#$NAME\n"
              fi
            done < <(grep -o '<testcase[^>]*/\?>\|<testcase[^>]*>.*</testcase>' "$f" || true)
          done
          if [ -z "$OUT" ]; then OUT="(no failed tests)"; fi
          OUT_ESCAPED=$(printf "%s" "$OUT" | sed ':a;N;$!ba;s/\n/\\n/g')
          echo "failed_list=$OUT_ESCAPED" >> $GITHUB_OUTPUT

      # Capture environment info (useful context in summary)
      - name: Capture environment info
        if: always()
        id: env_info
        shell: bash
        run: |
          JAVA=$(java -version 2>&1 | head -
