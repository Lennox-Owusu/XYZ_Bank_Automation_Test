name: Test Automation CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Build Docker image
      run: docker build -t xyz-bank-tests:latest .
    
    - name: Record start time
      id: start_time
      run: echo "start_time=$(date +%s)" >> $GITHUB_OUTPUT
    
    - name: Run tests in Docker
      run: |
        docker run --rm \
          -v $(pwd)/target:/app/target \
          xyz-bank-tests:latest
      continue-on-error: true
    
    - name: Calculate execution time
      if: always()
      id: execution_time
      run: |
        END_TIME=$(date +%s)
        START_TIME=${{ steps.start_time.outputs.start_time }}
        DURATION=$((END_TIME - START_TIME))
        MINUTES=$((DURATION / 60))
        SECONDS=$((DURATION % 60))
        echo "duration_formatted=${MINUTES}m ${SECONDS}s" >> $GITHUB_OUTPUT
    
    - name: Set up JDK 11
      if: always()
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
    
    - name: Generate Allure Report
      if: always()
      run: mvn allure:report
      continue-on-error: true
    
    - name: Get test results
      if: always()
      id: test_summary
      run: |
        TOTAL=0
        PASSED=0
        FAILED=0
        SKIPPED=0
        
        if [ -f target/surefire-reports/TEST-TestSuite.xml ]; then
          TOTAL=$(grep -oP 'tests="\K[0-9]+' target/surefire-reports/TEST-TestSuite.xml | head -1)
          FAILURES=$(grep -oP 'failures="\K[0-9]+' target/surefire-reports/TEST-TestSuite.xml | head -1)
          ERRORS=$(grep -oP 'errors="\K[0-9]+' target/surefire-reports/TEST-TestSuite.xml | head -1)
          SKIPPED=$(grep -oP 'skipped="\K[0-9]+' target/surefire-reports/TEST-TestSuite.xml | head -1)
          
          TOTAL=${TOTAL:-0}
          FAILURES=${FAILURES:-0}
          ERRORS=${ERRORS:-0}
          SKIPPED=${SKIPPED:-0}
          FAILED=$((FAILURES + ERRORS))
          PASSED=$((TOTAL - FAILED - SKIPPED))
        fi
        
        PASS_RATE=$((TOTAL > 0 ? PASSED * 100 / TOTAL : 0))
        
        echo "total=$TOTAL" >> $GITHUB_OUTPUT
        echo "passed=$PASSED" >> $GITHUB_OUTPUT
        echo "failed=$FAILED" >> $GITHUB_OUTPUT
        echo "skipped=$SKIPPED" >> $GITHUB_OUTPUT
        echo "pass_rate=$PASS_RATE" >> $GITHUB_OUTPUT
        
        if [ "$FAILED" -gt 0 ]; then
          echo "status=FAILED" >> $GITHUB_OUTPUT
          echo "status_emoji=🔴" >> $GITHUB_OUTPUT
        else
          echo "status=PASSED" >> $GITHUB_OUTPUT
          echo "status_emoji=✅" >> $GITHUB_OUTPUT
        fi
    
    - name: Extract failed tests
      if: always()
      id: failed_tests
      run: |
        if [ -f target/surefire-reports/TestSuite.txt ]; then
          FAILED_TESTS=$(grep "<<< FAILURE!" target/surefire-reports/TestSuite.txt | \
            grep -oP 'tests\.\w+\.\w+\.\K\w+' | sed 's/^/• /' | head -20)
          
          if [ -n "$FAILED_TESTS" ]; then
            echo "failed_list<<EOF" >> $GITHUB_OUTPUT
            echo "$FAILED_TESTS" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "failed_list=No failures" >> $GITHUB_OUTPUT
          fi
        else
          echo "failed_list=No report found" >> $GITHUB_OUTPUT
        fi
    
    - name: Send Slack notification
      if: always()
      uses: slackapi/slack-github-action@v1.25.0
      with:
        payload: |
          {
            "text": "🐳 XYZ Bank Tests (Docker)\nStatus: ${{ steps.test_summary.outputs.status }}\nPass Rate: ${{ steps.test_summary.outputs.pass_rate }}%\nTotal: ${{ steps.test_summary.outputs.total }} | Passed: ${{ steps.test_summary.outputs.passed }} | Failed: ${{ steps.test_summary.outputs.failed }}\nDuration: ${{ steps.execution_time.outputs.duration_formatted }}"
          }
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
    
    - name: Send failed tests to Slack
      if: always() && steps.test_summary.outputs.failed > 0
      run: |
        FAILED='${{ steps.failed_tests.outputs.failed_list }}'
        FORMATTED=$(echo "$FAILED" | tr '\n' ',' | sed 's/,/, /g' | sed 's/, $//')
        
        curl -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
          -H "Content-Type: application/json" \
          -d "{\"text\":\"❌ Failed Tests: ${FORMATTED}\"}"
